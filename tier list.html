<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Honkai: Star Rail Tier List - Februari 2026 (V3.8) APEX</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Orbitron:wght@600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #0a0e14;
      --card-bg: #0f1620;
      --text: #d1d9e0;
      --muted: #8a96a6;
      --border: #2a3340;
      --accent: #ff2d55;

      --dps: #e63946;
      --supportdps: #f4a261;
      --amp: #2a9d8f;
      --sustain: #457b9d;
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .container { max-width: 1600px; margin: 0 auto; }

    header { 
      text-align: center; 
      margin-bottom: 2rem; 
      position: relative;
    }

    .back-btn {
      position: absolute;
      left: 0;
      top: 0;
      padding: 0.6rem 1.2rem;
      background: rgba(255, 45, 85, 0.15);
      border: 2px solid #ff2d55;
      color: #ff2d55;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s ease;
    }

    .back-btn:hover {
      background: rgba(255, 45, 85, 0.3);
      transform: translateX(-4px);
    }

    h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 2.8rem;
      color: var(--accent);
      text-shadow: 0 0 15px rgba(255,45,85,0.5);
      margin-bottom: 2rem;
    }

    .filter-container {
      display: flex;
      gap: 1rem;
      justify-content: center;
      margin-bottom: 3rem;
      flex-wrap: wrap;
    }

    .filter-btn {
      padding: 0.7rem 1.5rem;
      border: 2px solid var(--border);
      background: #0d1117;
      color: var(--text);
      border-radius: 50px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s;
    }

    .filter-btn:hover,
    .filter-btn.active {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(255,45,85,0.15);
    }

    .filter-btn.dps { color: var(--dps); border-color: var(--dps); }
    .filter-btn.dps:hover,
    .filter-btn.dps.active { border-color: var(--dps); color: var(--dps); background: rgba(230,57,70,0.15); }

    .filter-btn.supportdps { color: var(--supportdps); border-color: var(--supportdps); }
    .filter-btn.supportdps:hover,
    .filter-btn.supportdps.active { border-color: var(--supportdps); color: var(--supportdps); background: rgba(244,162,97,0.15); }

    .filter-btn.amp { color: var(--amp); border-color: var(--amp); }
    .filter-btn.amp:hover,
    .filter-btn.amp.active { border-color: var(--amp); color: var(--amp); background: rgba(42,157,143,0.15); }

    .filter-btn.sustain { color: var(--sustain); border-color: var(--sustain); }
    .filter-btn.sustain:hover,
    .filter-btn.sustain.active { border-color: var(--sustain); color: var(--sustain); background: rgba(69,123,157,0.15); }

    .tier-section {
      display: flex;
      gap: 0;
      margin-bottom: 2.5rem;
      background: var(--card-bg);
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    .tier-label {
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 100px;
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: 3px;
      writing-mode: vertical-rl;
      transform: rotate(180deg);
      padding: 2rem 1rem;
      border-right: 3px solid var(--border);
    }

    .tier-section.t0 .tier-label { color: #ff2d55; border-right-color: #ff2d55; }
    .tier-section.t05 .tier-label { color: #ff6b6b; border-right-color: #ff6b6b; }
    .tier-section.t1 .tier-label { color: #ffaa00; border-right-color: #ffaa00; }
    .tier-section.t2 .tier-label { color: #88ccff; border-right-color: #88ccff; }
    .tier-section.t3 .tier-label { color: #66ff66; border-right-color: #66ff66; }
    .tier-section.t4 .tier-label { color: #ff99ff; border-right-color: #ff99ff; }
    .tier-section.t5 .tier-label { color: #ffaa00; border-right-color: #ffaa00; }

    .tier-content {
      flex: 1;
      padding: 2rem;
    }

    .apex-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 1.5rem;
    }

    .apex-column {
      display: contents;
    }

    .apex-column.dps .char-card { --role-color: var(--dps); }
    .apex-column.supportdps .char-card { --role-color: var(--supportdps); }
    .apex-column.amp .char-card { --role-color: var(--amp); }
    .apex-column.sustain .char-card { --role-color: var(--sustain); }

    .char-group {
      display: contents;
    }

    .char-group.separator {
      display: contents;
    }

    .char-card {
      background: #0a0e14;
      border-radius: 10px;
      padding: 0.7rem;
      text-align: center;
      border: 2px solid var(--role-color, var(--border));
      transition: all 0.3s;
      cursor: pointer;
      overflow: hidden;
      max-width: 160px;
      width: 100%;
    }

    .char-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 10px 30px rgba(255,45,85,0.35);
      border-color: var(--accent);
    }

    .char-card img {
      width: 100%;
      height: 120px;
      object-fit: cover;
      border-radius: 6px;
      margin-bottom: 0.5rem;
    }

    .char-name {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 0.3rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .char-tags {
      font-size: 0.75rem;
      color: #a0b0c0;
      line-height: 1.3;
    }

    .eo { color: #ffd700; font-weight: bold; }

    @media (max-width: 1200px) {
      .apex-grid { grid-template-columns: repeat(3, 1fr); }
    }

    @media (max-width: 768px) {
      .tier-section {
        flex-direction: column;
      }
      .tier-label {
        min-width: auto;
        writing-mode: horizontal-tb;
        transform: none;
        padding: 1rem;
        border-right: none;
        border-bottom: 3px solid;
        min-height: auto;
      }
      .apex-grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 480px) {
      .apex-grid { grid-template-columns: 1fr; }
      .filter-container { gap: 0.5rem; }
      .filter-btn { padding: 0.5rem 1rem; font-size: 0.9rem; }
    }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <button class="back-btn" onclick="window.location.href='home menu hsr.html'">← Kembali</button>
      <h1><img src="asset/hsr logo.jpg" alt="Tier List" style="height: 40px; vertical-align: middle;"> Tier List
      <p style="color:var(--muted); margin-bottom: 1.5rem;">Meta Februari 2026 (V3.8) • APEX CHARACTERS (T0 - T5)</p>
      
      <div class="filter-container">
        <button class="filter-btn" onclick="filterRole('all')">★ SEMUA</button>
        <button class="filter-btn dps" onclick="filterRole('dps')">♦ DPS</button>
        <button class="filter-btn supportdps" onclick="filterRole('supportdps')">✦ SUPPORT DPS</button>
        <button class="filter-btn amp" onclick="filterRole('amp')">⚡ AMPLIFIER</button>
        <button class="filter-btn sustain" onclick="filterRole('sustain')">♻ SUSTAIN</button>
      </div>
    </header>

    <div id="tiersContainer"></div>

    <script>
      // Default characters jika localStorage kosong
      const DEFAULT_CHARACTERS = [
        { name: "Anaxa", role: "dps", tier: "t0", image: "anaxa" },
        { name: "Castorice", role: "dps", tier: "t0", image: "castorice" },
        { name: "Evernight", role: "dps", tier: "t0", image: "evernight" },
        { name: "Hysilens", role: "dps", tier: "t0", image: "hysilens" },
        { name: "Phainon", role: "dps", tier: "t0", image: "phainon" },
        { name: "Kafka", role: "supportdps", tier: "t0", image: "kafka" },
        { name: "Ruan Mei", role: "amp", tier: "t0", image: "ruan mei" },
        { name: "Sparkle", role: "amp", tier: "t0", image: "sparkle" },
        { name: "Sunday", role: "amp", tier: "t0", image: "sunday" },
        { name: "Hyacine", role: "sustain", tier: "t0", image: "hyacine" },
        { name: "Lingsha", role: "sustain", tier: "t0", image: "lingsha" },
        
        { name: "Feixiao", role: "dps", tier: "t05", image: "feixiao" },
        { name: "Yunli", role: "dps", tier: "t05", image: "yunli" },
        { name: "Huohuo", role: "sustain", tier: "t05", image: "huohuo" },

        { name: "Yanqing", role: "dps", tier: "t1", image: "yanqing" },
        { name: "Seele", role: "dps", tier: "t1", image: "seele" },
        { name: "Jingliu", role: "dps", tier: "t1", image: "jingliu" },
        { name: "Robin", role: "amp", tier: "t1", image: "robin" },
        { name: "Bailu", role: "sustain", tier: "t1", image: "bailu" },

        { name: "Clara", role: "dps", tier: "t2", image: "clara" },
        { name: "Blade", role: "dps", tier: "t2", image: "bladev2" },
        { name: "Asta", role: "supportdps", tier: "t2", image: "asta" },
        { name: "Natasha", role: "sustain", tier: "t2", image: "natasha" },
        { name: "Gepard", role: "sustain", tier: "t2", image: "gepard" },

        { name: "Himeko", role: "dps", tier: "t3", image: "himeko" },
        { name: "Argenti", role: "dps", tier: "t3", image: "argenti" },
        { name: "Lynx", role: "sustain", tier: "t3", image: "lynx" },
        { name: "Bronya", role: "sustain", tier: "t3", image: "bronya" },

        { name: "Dr. Ratio", role: "dps", tier: "t4", image: "dr ratio" },
        { name: "Dan Heng IL", role: "dps", tier: "t4", image: "dan heng imbibitor lunae" },
        { name: "Xueyi", role: "dps", tier: "t4", image: "xueyi" },
        { name: "Fu Xuan", role: "sustain", tier: "t4", image: "Fu Xuan" },

        { name: "Arlan", role: "dps", tier: "t5", image: "arlan" },
        { name: "Dan Heng", role: "dps", tier: "t5", image: "dan heng" },
        { name: "Hook", role: "dps", tier: "t5", image: "hook" },
        { name: "Luka", role: "dps", tier: "t5", image: "luka" },
        { name: "Qingque", role: "dps", tier: "t5", image: "qingque" },
        { name: "Yukong", role: "sustain", tier: "t5", image: "yukong" }
      ];

      const TIER_ORDER = ["t0", "t05", "t1", "t15", "t2", "t3", "t4", "t5"];
      const TIER_LABELS = {
        t0: "T0",
        t05: "T0.5",
        t1: "T1",
        t15: "T1.5",
        t2: "T2",
        t3: "T3",
        t4: "T4",
        t5: "T5"
      };

      function getCharacters() {
        let stored = localStorage.getItem("characters");
        if (!stored) {
          return DEFAULT_CHARACTERS;
        }
        return JSON.parse(stored);
      }

      function renderTiers() {
        const characters = getCharacters();
        const container = document.getElementById("tiersContainer");
        
        // Group characters by tier
        const tierGroups = {};
        TIER_ORDER.forEach(tier => {
          tierGroups[tier] = {
            dps: [],
            supportdps: [],
            amp: [],
            sustain: []
          };
        });

        characters.forEach(char => {
          if (tierGroups[char.tier]) {
            tierGroups[char.tier][char.role].push(char);
          }
        });

        // Render each tier
        let html = "";
        TIER_ORDER.forEach(tier => {
          const tierData = tierGroups[tier];
          if (Object.values(tierData).flat().length === 0) return;

          html += `<div class="tier-section ${tier}">
            <div class="tier-label">${TIER_LABELS[tier]}</div>
            <div class="tier-content">
              <div class="apex-grid">`;

          // DPS
          if (tierData.dps.length > 0) {
            html += `<div class="apex-column dps">`;
            tierData.dps.forEach(char => {
              html += renderCharCard(char);
            });
            html += `</div>`;
          }

          // Support DPS
          if (tierData.supportdps.length > 0) {
            html += `<div class="apex-column supportdps">`;
            tierData.supportdps.forEach(char => {
              html += renderCharCard(char);
            });
            html += `</div>`;
          }

          // Amplifier
          if (tierData.amp.length > 0) {
            html += `<div class="apex-column amp">`;
            tierData.amp.forEach(char => {
              html += renderCharCard(char);
            });
            html += `</div>`;
          }

          // Sustain
          if (tierData.sustain.length > 0) {
            html += `<div class="apex-column sustain">`;
            tierData.sustain.forEach(char => {
              html += renderCharCard(char);
            });
            html += `</div>`;
          }

          html += `</div></div></div>`;
        });

        container.innerHTML = html;
      }

      function renderCharCard(char) {
        return `<div class="char-card">
          <img src="asset/${char.image}.webp" onerror="this.src='asset/placeholder.webp'" alt="${char.name}">
          <div class="char-name">${char.name}</div>
          <div class="char-tags">${char.role.toUpperCase()}</div>
        </div>`;
      }

      function filterRole(role) {
        const buttons = document.querySelectorAll('.filter-btn');
        buttons.forEach(btn => btn.classList.remove('active'));
        
        const cards = document.querySelectorAll('.apex-column');
        if (role === 'all') {
          cards.forEach(card => card.style.display = 'contents');
          buttons[0].classList.add('active');
        } else {
          cards.forEach(card => {
            if (card.classList.contains(role)) {
              card.style.display = 'contents';
            } else {
              card.style.display = 'none';
            }
          });
          document.querySelector(`[onclick="filterRole('${role}')"]`).classList.add('active');
        }
      }

      // Render on page load
      window.onload = renderTiers;

      // Refresh ketika localStorage berubah (dari admin panel)
      window.addEventListener("storage", renderTiers);
    </script>
  </div>
</body>
</html>
