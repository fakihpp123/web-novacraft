<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NovaCraft – Minecraft</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Orbitron:wght@600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #0a0e1a;
      --card: rgba(20, 25, 45, 0.7);
      --accent: #00d4ff;
      --accent-glow: #00aaff;
      --text: #e0f7ff;
      --muted: #a0d0ff;
      --border: rgba(0, 212, 255, 0.3);
      --glow: 0 0 30px rgba(0, 212, 255, 0.4);
      --shadow: 0 15px 40px rgba(0,0,0,0.7);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      padding: 2rem 1rem;
      background-image: 
        radial-gradient(circle at 30% 20%, rgba(0, 212, 255, 0.12) 0%, transparent 50%),
        radial-gradient(circle at 70% 80%, rgba(0, 212, 255, 0.08) 0%, transparent 50%);
    }

    .header {
      text-align: center;
      margin-bottom: 4rem;
    }

    .header h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(2.5rem, 8vw, 4.5rem);
      color: var(--accent);
      text-shadow: var(--glow);
      letter-spacing: 2px;
    }

    .header p {
      font-size: 1.1rem;
      color: var(--muted);
      margin-top: 0.5rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 2rem;
      max-width: 1200px;
      margin: 0 auto;
    }

    .card {
      background: var(--card);
      border-radius: 20px;
      padding: 2.5rem 1.8rem;
      text-align: center;
      text-decoration: none;
      color: var(--text);
      transition: all 0.4s ease;
      border: 1px solid var(--border);
      backdrop-filter: blur(10px);
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 50%, rgba(0, 212, 255, 0.08) 0%, transparent 70%);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    .card:hover::before {
      opacity: 1;
    }

    .card:hover {
      transform: translateY(-12px) scale(1.03);
      border-color: var(--accent);
      box-shadow: 0 25px 60px rgba(0, 212, 255, 0.35);
    }

    .card img {
      width: 120px;
      height: 120px;
      object-fit: contain;
      margin-bottom: 1.5rem;
      filter: drop-shadow(0 8px 20px rgba(0, 212, 255, 0.5));
      transition: transform 0.4s ease;
    }

    .card:hover img {
      transform: scale(1.1);
    }

    .card h3 {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.6rem;
      margin-bottom: 0.6rem;
      color: var(--accent);
      text-shadow: 0 2px 8px rgba(0, 212, 255, 0.3);
    }

    .card p {
      font-size: 1rem;
      color: var(--muted);
      line-height: 1.4;
    }

    @media (max-width: 768px) {
      .grid { grid-template-columns: 1fr; }
      .header h1 { font-size: 3rem; }
    }

    @media (max-width: 480px) {
      .card img { width: 100px; height: 100px; }
      .card h3 { font-size: 1.4rem; }
    }

    .back-btn-bottom {
      display: block;
      margin-top: 3rem;
      text-align: center;
    }

    .back-btn-bottom a {
      display: inline-block;
      padding: 0.9rem 2.5rem;
      background: linear-gradient(135deg, var(--accent), rgba(0, 212, 255, 0.8));
      border: 1px solid rgba(0, 212, 255, 0.4);
      border-radius: 10px;
      color: white;
      text-decoration: none;
      font-weight: 600;
      transition: all 0.3s ease;
      box-shadow: 0 6px 20px rgba(0, 212, 255, 0.3);
      font-size: 1rem;
    }

    .back-btn-bottom a:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 30px rgba(0, 212, 255, 0.5);
    }

    .back-btn-fixed {
      display: none;
    }

    @media (max-width: 480px) {
      .back-btn-fixed {
        top: 1rem;
        left: 1rem;
        padding: 0.7rem 1.2rem;
        font-size: 0.85rem;
      }

      .back-btn-bottom a {
        padding: 0.8rem 1.8rem;
        font-size: 0.9rem;
      }
    }
  </style>
</head>
<body>

  <a href="choose game.html" class="back-btn-fixed">← Kembali</a>

  <div class="header">
    <h1>NovaCraft</h1>
    <p>Minecraft – Edition & Konten Lengkap</p>
  </div>

  <div class="grid">

    <a href="minecraft.html" class="card">
      <img src="asset/mc logo.jpg" alt="Minecraft Editions">
      <h3>Pilih Edisi</h3>
      <p>Java Edition & Bedrock Edition – Bandingkan & Pilih</p>
    </a>

    <a href="minecraft java.html" class="card">
      <img src="asset/minecraft java.jpg" alt="Java Edition">
      <h3>Java Edition</h3>
      <p>Game utama Minecraft untuk PC – Mods, Server, & Komunitas</p>
    </a>

    <a href="minecraft bedrock.html" class="card">
      <img src="asset/minecraft bedrock.jpg" alt="Bedrock Edition">
      <h3>Bedrock Edition</h3>
      <p>Cross-platform – Mobile, Console, Windows 10/11</p>
    </a>

  </div>

  <div class="back-btn-bottom">
    <a href="choose game.html">← Kembali ke Home</a>
  </div>

</body>
</html>
